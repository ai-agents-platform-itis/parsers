# Локальная инфраструктура для разработки: Postgres + Redis.
# Запуск:  docker compose up -d
# Остановка: docker compose down   (данные останутся в volume)

services:
  postgres:
    image: postgres:16-alpine
    container_name: parser_postgres
    environment:
      POSTGRES_USER: parser
      POSTGRES_PASSWORD: parser
      POSTGRES_DB: parser_db
    ports:
      - "5432:5432"
    volumes:
      - parser_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parser -d parser_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: parser_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  parser_pgdata:
